AWSTemplateFormatVersion: "2010-09-09"
Description: >
  ECR Demo Lab — provisions a private ECR repository with scan-on-push,
  AES256 encryption, and a lifecycle rule that retains the last 10 images.

Parameters:
  ECRRepositoryName:
    Type: String
    Default: eugene_ecr-demo
    Description: Name for the ECR private repository.

Resources:

  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref ECRRepositoryName
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256
      LifecyclePolicy:
        LifecyclePolicyText: >
          {"rules":[{"rulePriority":1,"description":"Keep last 10 images",
          "selection":{"tagStatus":"any","countType":"imageCountMoreThan",
          "countNumber":10},"action":{"type":"expire"}}]}
      Tags:
        - Key: Project
          Value: ECR-Lab
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  ECRRepositoryURI:
    Description: Full URI of the ECR repository.
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRRepositoryName}"
    Export:
      Name: ECRRepositoryURI
